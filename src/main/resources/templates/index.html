<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management System</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            color: #fff;
            padding: 32px 0;
            margin-bottom: 32px;
        }
        .header .wrap {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header p {
            margin-top: 6px;
            font-size: 14px;
            opacity: 0.85;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px 48px;
        }

        /* ── 고객명 카드 ── */
        .customer-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .customer-card label {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }
        .customer-card input {
            flex: 1;
            max-width: 320px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color .2s;
        }
        .customer-card input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,.12);
        }
        .customer-card .hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ── 상품 테이블 ── */
        .table-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .table-card .card-title {
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: #f1f5f9;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
            padding: 12px 16px;
            text-align: left;
        }
        tbody td {
            padding: 14px 16px;
            font-size: 14px;
            border-top: 1px solid var(--border);
            vertical-align: middle;
        }
        tbody tr:hover { background: #f8fafc; }

        .price { font-weight: 600; color: var(--text); }
        .stock-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .stock-ok { background: #dcfce7; color: var(--success); }
        .stock-low { background: #fef9c3; color: #a16207; }
        .stock-out { background: #fee2e2; color: var(--danger); }

        .qty-input {
            width: 72px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        .qty-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,.12);
        }

        .btn-order {
            padding: 8px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }
        .btn-order:hover { background: var(--primary-hover); }
        .btn-order:active { transform: scale(.97); }
        .btn-order:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .empty-row td {
            text-align: center;
            padding: 48px 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ── 토스트 알림 ── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            min-width: 320px;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,.15);
            animation: slideIn .3s ease, fadeOut .4s ease 3.6s forwards;
        }
        .toast.success { background: var(--success); }
        .toast.error   { background: var(--danger);  }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes fadeOut {
            to   { opacity: 0; transform: translateY(-12px); }
        }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <div class="wrap">
        <h1>Order Management System</h1>
        <p>상품 목록을 확인하고 바로 주문해보세요.</p>
    </div>
</div>

<div class="container">
    <div class="customer-card">
        <label for="customerName">고객명</label>
        <input id="customerName" type="text" placeholder="예: 홍길동">
        <span class="hint">주문 시 사용됩니다</span>
    </div>

    <div class="table-card">
        <div class="card-title">상품 목록</div>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>상품명</th>
                <th>가격</th>
                <th>재고</th>
                <th>수량</th>
                <th></th>
            </tr>
            </thead>
            <tbody id="productTableBody">
            <tr class="empty-row">
                <td colspan="6">상품 목록을 불러오는 중...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script th:inline="javascript">
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function stockBadge(qty) {
        if (qty <= 0) return `<span class="stock-badge stock-out">${qty}개</span>`;
        if (qty <= 5) return `<span class="stock-badge stock-low">${qty}개</span>`;
        return `<span class="stock-badge stock-ok">${qty}개</span>`;
    }

    function formatPrice(value) {
        return Number(value).toLocaleString('ko-KR') + '원';
    }

    async function loadProducts() {
        const tbody = document.getElementById('productTableBody');

        try {
            const response = await fetch('/api/products');
            if (!response.ok) {
                throw new Error('상품 조회 실패');
            }

            const products = await response.json();
            if (!products.length) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="6">등록된 상품이 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(product => `
                <tr>
                    <td>${product.id}</td>
                    <td><strong>${product.name}</strong></td>
                    <td class="price">${formatPrice(product.price)}</td>
                    <td>${stockBadge(product.stockQuantity)}</td>
                    <td>
                        <input id="qty-${product.id}" class="qty-input" type="number"
                               min="1" value="1" ${product.stockQuantity <= 0 ? 'disabled' : ''} />
                    </td>
                    <td>
                        <button class="btn-order" onclick="placeOrder(${product.id}, this)"
                                ${product.stockQuantity <= 0 ? 'disabled' : ''}>
                            주문하기
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="6">상품 목록 조회에 실패했습니다.</td></tr>';
        }
    }

    async function placeOrder(productId, btn) {
        const customerName = document.getElementById('customerName').value.trim();
        const quantity = Number(document.getElementById(`qty-${productId}`).value);

        if (!customerName) {
            showToast('고객명을 입력해주세요.', 'error');
            document.getElementById('customerName').focus();
            return;
        }

        if (!Number.isInteger(quantity) || quantity < 1) {
            showToast('주문 수량은 1 이상이어야 합니다.', 'error');
            return;
        }

        const original = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>처리 중';

        const payload = {
            customerName,
            items: [{ productId, quantity }]
        };

        try {
            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const result = await response.json();
                showToast(`주문 성공! 주문번호: ${result.orderNumber}`, 'success');
                await loadProducts();
                return;
            }

            let message = '주문 실패';
            try {
                const errorBody = await response.json();
                message = errorBody.message || message;
            } catch (ignored) {}
            showToast(`주문 실패: ${message}`, 'error');
        } catch (error) {
            showToast('주문 중 네트워크 오류가 발생했습니다.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = original;
        }
    }

    loadProducts();
</script>
</body>
</html>
